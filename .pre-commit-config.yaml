repos:
  - repo: local
    hooks:
      - id: ruff-lint-python
        name: ruff lint (Python)
        language: system
        entry: ruff check
        args: [--fix]
        files: \.py$
        pass_filenames: true

      - id: ruff-format-python
        name: ruff format (Python)
        language: system
        entry: ruff format
        files: \.py$
        pass_filenames: true

      - id: oxfmt-js
        name: oxfmt (JS/TS)
        language: system
        entry: scripts/pre-commit/oxfmt.sh
        files: ^js/.*\.(jsx?|tsx?|json|ya?ml)$
        pass_filenames: true

      - id: oxlint-js
        name: oxlint (JS/TS)
        language: system
        entry: scripts/pre-commit/oxlint.sh
        files: ^js/.*\.[jt]sx?$
        pass_filenames: true

      - id: check-wrapt-version
        name: Check wrapt version
        language: python
        entry: python -c 'import pkg_resources; pkg_resources.require("wrapt>=2.0.0")'
        files: ^.*$